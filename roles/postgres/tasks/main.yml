---
- name: Install PostgreSQL
  apt:
    name: postgresql-{{ postgres_version }}
    state: present

- name: Create database
  postgresql_db:
    name: "{{ postgres_db }}"
    encoding: UTF-8
    login_user: postgres

- name: Create user
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
    db: "{{ postgres_db }}"
    priv: "ALL"
    login_user: postgres
