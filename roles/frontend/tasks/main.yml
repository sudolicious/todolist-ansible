---
- name: Install Node.js and npm
  apt:
    name:
      - nodejs
      - npm
    state: present
  tags: nodejs

- name: Clone repository
  git:
    repo: "{{ frontend_repo }}"
    dest: "{{ frontend_src_dir }}"
    version: "{{ frontend_branch }}"

- name: Install dependencies
  shell: |
    cd {{ frontend_app_dir }}
    npm install
  args:
    executable: /bin/bash 

- name: Install Nginx
  apt:
    name: nginx
    state: present  

- name: Build frontend
  shell: |
    cd {{ frontend_app_dir }}
    npm run build
    
- name: Create frontend .env file
  copy:
    content: |
      REACT_APP_API_BASE_URL={{ frontend_api_url }}
    dest: "{{ frontend_app_dir }}/.env"

- name: Configure Nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/todolist
  notify: restart nginx

- name: Enable Nginx config
  file:
    src: /etc/nginx/sites-available/todolist
    dest: /etc/nginx/sites-enabled/todolist
    state: link
