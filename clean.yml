---
- name: Clean deployment
  hosts: vm2
  become: yes
  vars_files:
    - vars.yml
  
  tasks:
    - name: Remove application directory
      file:
        path: "{{ app_dir }}"
        state: absent
      ignore_errors: yes

- name: Clean Docker containers and resources
  hosts: vm2
  become: yes
  tasks:
    - name: Stop and remove PostgreSQL container
      community.docker.docker_container:
        name: postgres
        state: absent
        force_kill: yes

    - name: Remove unused Docker networks
      community.docker.docker_network:
        name: my_network
        state: absent

    - name: Force remove Docker volume (even if in use)
      shell: |
        docker volume rm -f postgres_data || true
      args:
        warn: no
      register: volume_removal
      failed_when: false

    - name: Clean unused Docker images and cache
      shell: |
        docker system prune -a -f --volumes
      args:
        warn: no
      when: cleanup_all_resources | default(false)
